name: emprendedor
description: "interfaz"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.0.7

  cupertino_icons: ^1.0.8

  firebase_core: ^4.1.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.0.0
  image_picker: ^1.2.0
  provider: ^6.1.5
  intl: ^0.20.2
  fl_chart: ^0.67.0
  excel: ^4.0.0
  pdf: ^3.10.0
  printing: ^5.11.0
  path_provider: ^2.0.0
  open_filex: ^4.4.0
  logging: ^1.2.0
  collection: ^1.18.0
  url_launcher: ^6.2.2
  firebase_analytics: ^12.0.1
  firebase_core_platform_interface: ^6.0.0
  firebase_app_check: ^0.4.0+1
  intl_phone_field: ^3.2.0
  font_awesome_flutter: ^10.10.0
  shared_preferences: ^2.2.3
  email_validator: ^2.1.17

  firebase_ui_auth: ^3.0.0
  firebase_ui_firestore: ^2.0.0
  google_sign_in: ^6.2.1
  flutter_signin_button: ^2.0.0
  firebase_ai: ^3.2.0
  change_app_package_name: ^1.5.0

  google_maps_flutter: ^2.13.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-black.ttf
        - asset: assets/fonts/Poppins-BlackItalic.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
        - asset: assets/fonts/Poppins-BoldItalic.ttf
        - asset: assets/fonts/Poppins-ExtraBold.ttf
        - asset: assets/fonts/Poppins-ExtraBoldItalic.ttf
        - asset: assets/fonts/Poppins-ExtraLight.ttf
        - asset: assets/fonts/Poppins-ExtraLightItalic.ttf
        - asset: assets/fonts/Poppins-Italic.ttf
        - asset: assets/fonts/Poppins-Light.ttf
        - asset: assets/fonts/Poppins-LightItalic.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-MediumItalic.ttf
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins-SemiBoldItalic.ttf
        - asset: assets/fonts/Poppins-Thin.ttf
        - asset: assets/fonts/Poppins-ThinItalic.ttf